<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Hodowla Koni</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f2f2f;
      color: white;
    }

    .container {
      display: grid;
      grid-template-columns: 220px 1fr 220px;
      grid-template-rows: 80px 1fr;
      height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      grid-row: 1 / span 2;
      background: #133c3c;
      padding: 15px;
    }

    .sidebar h3 {
      margin-top: 0;
    }

    .menu-item {
      margin: 12px 0;
      padding: 8px;
      background: #1c5555;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .menu-item:hover {
      background: #2d7a7a;
    }

    /* TOPBAR */
    .topbar {
      grid-column: 2 / span 2;
      background: #1c5555;
      display: flex;
      align-items: center;
      padding-left: 20px;
      font-size: 20px;
    }

    /* MAIN */
    .main {
      padding: 20px;
      background: #e8f5f5;
      color: black;
      overflow-y: auto;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #2d7a7a;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #3fa3a3;
    }

    /* LEADERBOARD */
    .leaderboard {
      background: #133c3c;
      padding: 15px;
    }

    .leaderboard h3 {
      margin-top: 0;
    }

    .player {
      background: #1c5555;
      padding: 8px;
      margin: 5px 0;
      border-radius: 6px;
    }

    .expedition, .horse {
      background: #ffffff;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
    }

  </style>
</head>
<body>

<div class="container">

  <!-- LEWY PANEL -->
  <div class="sidebar">
    <h3>🐎 Gracz</h3>
    Nazwa<br>
    Konie: <span id="horseCount">0</span><br>
    Monety: 0

    <hr>

    <div class="menu-item" onclick="showSection('expedition')">🌍 Wyprawa</div>
    <div class="menu-item" onclick="showSection('stable')">🐎 Stajnia</div>
    <div class="menu-item">🏪 Sklep</div>
    <div class="menu-item">🏆 Zawody</div>
    <div class="menu-item">🧬 Rozmnażanie</div>
  </div>

  <!-- GÓRA -->
  <div class="topbar">
    🐎 HAPPY HORSES
  </div>

  <!-- GŁÓWNA SEKCJA -->
  <div class="main">

    <!-- WYPRAWA -->
    <div id="expeditionSection">
      <h2>🌍 Wyprawy</h2>

      <button onclick="startExpedition()">Rozpocznij wyprawę</button>

      <div id="log"></div>

      <h3>Aktywne wyprawy:</h3>
      <div id="expeditions"></div>
    </div>

    <!-- STAJNIA -->
    <div id="stableSection" style="display:none;">
      <h2>🐎 Twoje konie</h2>
      <div id="horses"></div>
    </div>

  </div>

  <!-- LEADERBOARD -->
  <div class="leaderboard">
    <h3>🏆 Ranking</h3>

    <div class="player">Gracz1 - 10 koni</div>
    <div class="player">Gracz2 - 8 koni</div>
    <div class="player">Gracz3 - 6 koni</div>
  </div>

</div>

<script>
function showSection(section) {
  document.getElementById("expeditionSection").style.display = "none";
  document.getElementById("stableSection").style.display = "none";

  if (section === "expedition") {
    document.getElementById("expeditionSection").style.display = "block";
  }

  if (section === "stable") {
    document.getElementById("stableSection").style.display = "block";
  }
}
</script>

<script src="js/horses.js"></script>
<script src="js/expedition.js"></script>
<script src="js/game.js"></script>
<script src="main.js"></script>

</body>
</html>
