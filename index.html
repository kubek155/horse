<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Happy Horses</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f2f2f;
  color:white;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns:220px 1fr 250px;
  grid-template-rows:80px 1fr;
  height:100vh;
}

/* GÓRA */
.topbar {
  grid-column:1/4;
  background:#1f5f5f;
  display:flex;
  align-items:center;
  padding:0 20px;
  font-size:20px;
}

/* LEWY PANEL */
.sidebar {
  background:#123c3c;
  padding:15px;
}

/* PRAWA */
.rightbar {
  background:#123c3c;
  padding:15px;
}

/* ŚRODEK */
.main {
  background:#e6f2f2;
  color:black;
  padding:20px;
}

/* MENU */
.menu-item {
  margin:10px 0;
  padding:12px;
  background:#1f5f5f;
  border-radius:10px;
  cursor:pointer;
}

/* BOX */
.box {
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:12px;
}

/* BUTTON */
button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#1f5f5f;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- GÓRA -->
<div class="topbar">
🐎 HAPPY HORSES
</div>

<!-- LEWO -->
<div class="sidebar">
<h3>🐎 Gracz</h3>
Konie: <span id="horseCount">0</span>

<div class="menu-item" onclick="showSection('expedition')">🌍 Wyprawy</div>
<div class="menu-item" onclick="showSection('stable')">🐎 Stajnia</div>
<div class="menu-item" onclick="showSection('inventory')">🎒 Ekwipunek</div>
</div>

<!-- ŚRODEK -->
<div class="main">

<div id="expeditionSection">

<div class="box">
<h3>Wybierz krainę</h3>
<div id="locations"></div>
</div>

<div class="box">
<h3>Aktywne wyprawy</h3>
<div id="expeditionsDiv"></div>
</div>

<div class="box">
<div id="log"></div>
</div>

</div>

<div id="stableSection" style="display:none;">
<div id="horses"></div>
</div>

<div id="inventorySection" style="display:none;">
<div id="inventory"></div>
</div>

</div>

<!-- PRAWO -->
<div class="rightbar">
<h3>🏆 Ranking</h3>

<div class="box">
NPC 1<br>
NPC 2
</div>
</div>

</div>

<script>
function showSection(s){
document.getElementById("expeditionSection").style.display="none";
document.getElementById("stableSection").style.display="none";
document.getElementById("inventorySection").style.display="none";

if(s==="expedition") document.getElementById("expeditionSection").style.display="block";
if(s==="stable") document.getElementById("stableSection").style.display="block";
if(s==="inventory") document.getElementById("inventorySection").style.display="block";
}
</script>

<script src="js/database.js"></script>
<script src="js/horses.js"></script>
<script src="js/items.js"></script>
<script src="js/expedition.js"></script>
<script src="js/game.js"></script>
<script src="main.js"></script>

</body>
</html>
