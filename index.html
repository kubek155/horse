<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Hodowla Koni</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f2f2f;
      color: white;
    }

    .container {
      display: grid;
      grid-template-columns: 220px 1fr 220px;
      grid-template-rows: 80px 1fr;
      height: 100vh;
    }

    .sidebar {
      grid-row: 1 / span 2;
      background: #133c3c;
      padding: 15px;
    }

    .menu-item {
      margin: 10px 0;
      padding: 8px;
      background: #1c5555;
      border-radius: 8px;
      cursor: pointer;
    }

    .topbar {
      grid-column: 2 / span 2;
      background: #1c5555;
      display: flex;
      align-items: center;
      padding-left: 20px;
    }

    .main {
      padding: 20px;
      background: #e8f5f5;
      color: black;
    }

    .leaderboard {
      background: #133c3c;
      padding: 15px;
    }

    button {
      margin: 5px;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="sidebar">
    <h3>🐎 Gracz</h3>
    Konie: <span id="horseCount">0</span>

    <hr>

    <div class="menu-item" onclick="showSection('expedition')">🌍 Wyprawa</div>
    <div class="menu-item" onclick="showSection('stable')">🐎 Stajnia</div>
  </div>

  <div class="topbar">
    🐎 HAPPY HORSES
  </div>

  <div class="main">

    <!-- WYPRAWA -->
    <div id="expeditionSection">
      <h2>🌍 Wyprawy</h2>

      <h3>Wybierz krainę:</h3>
      <div id="locations"></div>

      <div id="log"></div>

      <h3>Aktywne wyprawy:</h3>
      <div id="expeditions"></div>
    </div>

    <!-- STAJNIA -->
    <div id="stableSection" style="display:none;">
      <h2>🐎 Twoje konie</h2>
      <div id="horses"></div>
    </div>

  </div>

  <div class="leaderboard">
    <h3>🏆 Ranking</h3>
    <div>Gracz1</div>
    <div>Gracz2</div>
  </div>

</div>

<script>
function showSection(section) {
  document.getElementById("expeditionSection").style.display = "none";
  document.getElementById("stableSection").style.display = "none";

  if (section === "expedition") {
    document.getElementById("expeditionSection").style.display = "block";
  }

  if (section === "stable") {
    document.getElementById("stableSection").style.display = "block";
  }
}
</script>

<script src="js/horses.js"></script>
<script src="js/expedition.js"></script>
<script src="js/game.js"></script>
<script src="main.js"></script>

</body>
</html>
