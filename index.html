<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Hodowla Koni</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth">
  <h2>Logowanie</h2>
  <input id="loginUser" placeholder="Login"><br>
  <input id="loginPass" type="password" placeholder="Hasło"><br>
  <button onclick="login()">Zaloguj</button>

  <h2>Rejestracja</h2>
  <input id="regUser" placeholder="Login"><br>
  <input id="regPass" type="password" placeholder="Hasło"><br>
  <button onclick="register()">Zarejestruj</button>
</div>

<div id="game" style="display:none;">
  <h1>🐎 Hodowla Koni</h1>
  <button onclick="logout()">Wyloguj</button><br>
  <button onclick="startExpedition()">Wyprawa</button>

  <div id="log"></div>

  <h2>Wyprawy</h2>
  <div id="expeditions"></div>

  <h2>Konie</h2>
  <div id="horses"></div>
</div>

<script src="js/auth.js"></script>
<script src="js/horses.js"></script>
<script src="js/expedition.js"></script>
<script src="js/game.js"></script>
<script src="main.js"></script>

</body>
</html>
